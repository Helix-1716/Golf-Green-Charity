[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  # These are expected in build output and safe to whitelist:
  # - NEXT_PUBLIC_ keys are intentionally bundled into client JS by Next.js
  # - Server-only keys are secured in Netlify's environment vault
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_SECRET_KEY,SUPABASE_SERVICE_ROLE_KEY,STRIPE_WEBHOOK_SECRET,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "upgrade-insecure-requests"
