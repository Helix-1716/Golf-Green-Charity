[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  # Omit server-only secrets from build scanning to prevent false positives in .next/server bundles
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_SECRET_KEY,SUPABASE_SERVICE_ROLE_KEY,STRIPE_WEBHOOK_SECRET"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "upgrade-insecure-requests"
